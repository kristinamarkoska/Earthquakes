<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Earthquake App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { padding:20px; background:#f8f9fa; }
        .btn { margin-right:10px; }
        #map { height: 400px; margin-bottom: 20px; }
    </style>
</head>

<body>

<h2>🌍 Earthquake Dashboard</h2>

<!-- MAP -->
<div id="map"></div>

<div class="mb-3">
    <button class="btn btn-primary" onclick="fetchData()">Fetch</button>
    <button class="btn btn-secondary" onclick="loadAll()">All</button>
    <button class="btn btn-danger" onclick="loadStrong()">Mag > 2</button>

    <input type="number" id="timeInput" placeholder="Enter time (ms)">
    <button class="btn btn-warning" onclick="loadAfterTime()">After Time</button>
</div>

<table class="table table-bordered">
    <thead class="table-dark">
    <tr>
        <th>ID</th>
        <th>Magnitude</th>
        <th>Place</th>
        <th>Title</th>
        <th>Time</th>
        <th>Action</th>
    </tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

<script>

    const API = "http://localhost:8080/api/earthquakes";

    // MAP INIT
    let map = L.map('map').setView([20, 0], 2);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    let markers = [];

    function clearMarkers(){
        markers.forEach(m => map.removeLayer(m));
        markers = [];
    }

    // format time
    function formatTime(ms){
        return new Date(ms).toLocaleString();
    }

    // MAP + TABLE RENDER
    function render(data){
        let html = "";

        clearMarkers();

        data.forEach(eq => {

            html += `
        <tr>
            <td>${eq.id}</td>
            <td>${eq.magnitude}</td>
            <td>${eq.place}</td>
            <td>${eq.title}</td>
            <td>${formatTime(eq.time)}</td>
            <td>
                <button class="btn btn-sm btn-danger" onclick="deleteEq(${eq.id})">Delete</button>
            </td>
        </tr>`;

            // fake coordinates (since API has no lat/lon in DB)
            let lat = (Math.random() * 140) - 70;
            let lon = (Math.random() * 360) - 180;

            let marker = L.marker([lat, lon]).addTo(map);

            marker.bindPopup(`
            <b>${eq.title}</b><br>
            Magnitude: ${eq.magnitude}<br>
            Place: ${eq.place}<br>
            Time: ${formatTime(eq.time)}
        `);

            markers.push(marker);
        });

        document.getElementById("tableBody").innerHTML = html;
    }

    // FETCH
    function fetchData(){
        fetch(API+"/fetch")
            .then(r=>r.text())
            .then(msg=>{
                alert(msg);
                loadAll();
            });
    }

    // ALL
    function loadAll(){
        fetch(API)
            .then(r=>r.json())
            .then(data=>render(data));
    }

    // MAG > 2
    function loadStrong(){
        fetch(API+"/strong")
            .then(r=>r.json())
            .then(data=>render(data));
    }

    // AFTER TIME
    function loadAfterTime(){
        let time = document.getElementById("timeInput").value;

        fetch(API+"/after?time="+time)
            .then(r=>r.json())
            .then(data=>render(data));
    }

    // DELETE
    function deleteEq(id){
        fetch(API+"/"+id, { method:"DELETE" })
            .then(()=>loadAll());
    }

    // auto refresh
    setInterval(loadAll, 10000);

    // init
    loadAll();

</script>

</body>
</html>
